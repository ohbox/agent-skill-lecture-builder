<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">AI 與 ETF 股市分析框架</title>
  <desc id="desc">題材、資金、ETF 結構、風險規則四步驟分析圖</desc>
  <rect width="900" height="620" rx="28" fill="#0f172a"/>
  <rect x="40" y="40" width="820" height="540" rx="22" fill="#f8fafc"/>
  <text x="450" y="96" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="34" font-weight="700" fill="#111827">AI × ETF 動態分析框架</text>
  <text x="450" y="130" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="17" fill="#475569">先問市場邏輯，再檢查工具，最後寫下風險條件</text>

  <g font-family="Arial, 'Noto Sans TC', sans-serif">
    <rect x="82" y="186" width="330" height="130" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <circle cx="126" cy="231" r="25" fill="#2563eb"/>
    <text x="126" y="240" text-anchor="middle" font-size="28" fill="#ffffff">1</text>
    <text x="170" y="224" font-size="24" font-weight="700" fill="#1e3a8a">題材在哪裡？</text>
    <text x="170" y="256" font-size="17" fill="#334155">晶片、雲端、應用、電力</text>
    <text x="170" y="284" font-size="17" fill="#334155">誰能把需求轉成獲利</text>

    <rect x="488" y="186" width="330" height="130" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <circle cx="532" cy="231" r="25" fill="#16a34a"/>
    <text x="532" y="240" text-anchor="middle" font-size="28" fill="#ffffff">2</text>
    <text x="576" y="224" font-size="24" font-weight="700" fill="#166534">資金有跟上嗎？</text>
    <text x="576" y="256" font-size="17" fill="#334155">價格、成交量、ETF 流入</text>
    <text x="576" y="284" font-size="17" fill="#334155">法人與產業輪動方向</text>

    <rect x="82" y="374" width="330" height="130" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <circle cx="126" cy="419" r="25" fill="#d97706"/>
    <text x="126" y="428" text-anchor="middle" font-size="28" fill="#ffffff">3</text>
    <text x="170" y="412" font-size="24" font-weight="700" fill="#92400e">ETF 裝了什麼？</text>
    <text x="170" y="444" font-size="17" fill="#334155">持股、權重、費用、流動性</text>
    <text x="170" y="472" font-size="17" fill="#334155">折溢價、匯率、再平衡</text>

    <rect x="488" y="374" width="330" height="130" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <circle cx="532" cy="419" r="25" fill="#dc2626"/>
    <text x="532" y="428" text-anchor="middle" font-size="28" fill="#ffffff">4</text>
    <text x="576" y="412" font-size="24" font-weight="700" fill="#991b1b">何時要修正？</text>
    <text x="576" y="444" font-size="17" fill="#334155">反方證據、風險上限</text>
    <text x="576" y="472" font-size="17" fill="#334155">檢查頻率與退出條件</text>

    <path d="M414 251h58" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M462 239l18 12-18 12" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M653 318v38" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M641 346l12 18 12-18" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M486 439h-58" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M438 427l-18 12 18 12" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="450" y="548" text-anchor="middle" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="19" font-weight="700" fill="#111827">目標：把熱門題材變成可驗證的市場假設</text>
</svg>
